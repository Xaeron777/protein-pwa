<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обратная связь</title>
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#336699">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<style>
    .feedback-list {
        margin-top: 20px;
    }
    .feedback-item {
        border: 1px solid #ccc;
        padding: 12px;
        margin-bottom: 10px;
        background: #fff;
    }
    .feedback-item strong {
        color: #336699;
    }
    .feedback-item .date {
        font-size: 12px;
        color: #888;
    }
</style>
</head>
<body>
<header>
<div class="container">
<nav>
<a href="index.html" class="logo">Высокобелковые продукты</a>
<ul class="nav-links">
<li><a href="index.html">Главная</a></li>
<li><a href="about.html">О белке</a></li>
<li><a href="feedback.html">Обратная связь</a></li>
<li><a href="todolist.html">Список задач</a></li>
</ul>
</nav>
</div>
</header>
<main class="container">
<h1>Обратная связь</h1>
<div id="status" class="status" style="display:none;padding:10px;margin-bottom:15px;background:#e8f0f7;border:1px solid #336699;"></div>
<form id="feedbackForm">
<p><label>Имя:<br><input type="text" id="fbName" required></label></p>
<p><label>Email:<br><input type="email" id="fbEmail" required></label></p>
<p><label>Сообщение:<br><textarea id="fbMessage" required></textarea></label></p>
<p><button type="submit">Отправить</button></p>
</form>

<h2>Сообщения:</h2>
<div id="feedbackList" class="feedback-list"></div>
</main>

<script>
function showStatus(text) {
    let el = document.getElementById('status');
    el.textContent = text;
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 2000);
}

function loadFeedback() {
    let list = document.getElementById('feedbackList');
    let saved = localStorage.getItem('feedback');
    let items = [];
    if (saved) {
        try { items = JSON.parse(saved); } catch(e) {}
    }
    list.innerHTML = '';
    if (items.length === 0) {
        list.innerHTML = '<p style="color:#888;">Пока нет сообщений.</p>';
        return;
    }
    for (let i = items.length - 1; i >= 0; i--) {
        let r = items[i];
        let div = document.createElement('div');
        div.className = 'feedback-item';
        div.innerHTML = '<strong>' + escapeHtml(r.name) + '</strong> ' +
            '<span class="date">(' + r.date + ')</span><br>' +
            escapeHtml(r.message);
        list.appendChild(div);
    }
}

function escapeHtml(text) {
    let div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.getElementById('feedbackForm').addEventListener('submit', function(e) {
    e.preventDefault();
    let name = document.getElementById('fbName').value.trim();
    let email = document.getElementById('fbEmail').value.trim();
    let message = document.getElementById('fbMessage').value.trim();

    if (!name || !email || !message) {
        showStatus('Заполните все поля');
        return;
    }

    let saved = localStorage.getItem('feedback');
    let items = [];
    if (saved) {
        try { items = JSON.parse(saved); } catch(e) {}
    }

    let now = new Date();
    let dateStr = now.getFullYear() + '-' +
        String(now.getMonth()+1).padStart(2,'0') + '-' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0');

    items.push({
        name: name,
        email: email,
        message: message,
        date: dateStr
    });

    localStorage.setItem('feedback', JSON.stringify(items));
    document.getElementById('feedbackForm').reset();
    showStatus('Отправлено!');
    loadFeedback();
});

loadFeedback();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const reg = await navigator.serviceWorker.register('service-worker.js');
            console.log('SW registered', reg.scope);
        } catch (err) {
            console.error('SW failed', err);
        }
    });
}
</script>
</body>
</html>
